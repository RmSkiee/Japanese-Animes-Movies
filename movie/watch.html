<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details - Movie Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0f1015;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(circle at 50% 0%, #1a1b26 0%, #0f1015 70%);
    }

    /* Header */
    header {
      padding: 20px 40px;
      background: rgba(26, 27, 38, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #2a2b36;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      text-decoration: none;
      color: #00f0ff;
      font-size: 1.1rem;
      font-weight: 600;
      transition: color 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover {
      color: #ffffff;
    }

    /* Main Content Container */
    .details-container {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .info-card {
      background: #151620;
      border: 1px solid #2a2b36;
      border-radius: 16px;
      width: 100%;
      max-width: 900px;
      padding: 50px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    /* Movie Title & Badges */
    .movie-title {
      font-size: 3rem;
      color: #00f0ff;
      margin-bottom: 15px;
      font-weight: 800;
      line-height: 1.2;
    }

    .metadata-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 30px;
    }

    .tag {
      background: #1a1b26;
      color: #a0a0b0;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1px solid #2a2b36;
    }

    .tag strong {
      color: #ffffff;
    }

    /* Video Player Section */
    .video-section {
      width: 100%;
      margin-bottom: 40px;
      border-bottom: 1px solid #2a2b36;
      padding-bottom: 40px;
    }

    .custom-video-player {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 12px;
      border: 2px solid #2a2b36;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .custom-video-player video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      outline: none;
    }

    /* Text Sections */
    .content-section {
      margin-bottom: 40px;
    }

    .content-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 1.4rem;
      color: #ffffff;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: "";
      display: block;
      width: 4px;
      height: 20px;
      background: #00f0ff;
      border-radius: 2px;
    }

    .section-text {
      color: #d0d0e0;
      font-size: 1.1rem;
      line-height: 1.8;
    }

    /* Error / Not Found State */
    .not-found {
      text-align: center;
      color: #a0a0b0;
      font-size: 1.2rem;
      padding: 40px 0;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="back-btn"><span>←</span> Back to Hub</a>
  </header>

  <main class="details-container">
    <div class="info-card" id="info-card">
      
      <h1 class="movie-title" id="display-title">Loading Details...</h1>
      
      <div class="metadata-tags" id="metadata-container">
        </div>

      <div class="video-section" id="video-container-wrapper" style="display: none;">
        <div class="custom-video-player" id="video-container">
          </div>
      </div>

      <div class="content-section">
        <h2 class="section-title">The Story</h2>
        <p class="section-text" id="display-synopsis">Please wait while we fetch the story details...</p>
      </div>

      <div class="content-section">
        <h2 class="section-title">Why It's Special</h2>
        <p class="section-text" id="display-creator">Loading creator information...</p>
      </div>

    </div>
  </main>

  <script>
    // Database with trailer1.mp4 to trailer10.mp4
    const movieDatabase = {
      "Mary and the Witch's Flower": {
        director: "Hiromasa Yonebayashi",
        studio: "Studio Ponoc",
        year: "2017",
        trailer: "trailer1.mp4",
        synopsis: "Mary is a young girl spending a boring summer in the country. One day, she follows a cat into the woods and finds a rare, magical flower. This flower gives her witch powers for just one night! She flies a broomstick to a secret magic school, but soon finds out the teachers are hiding a dark secret about dangerous magic experiments.",
        creatorInfo: "This was the very first movie made by Studio Ponoc. The director used to work at the famous Studio Ghibli, which is why the art style looks so familiar and beautiful. It's a really fun, magical adventure based on an old children's book."
      },
      "Princess Mononoke": {
        director: "Hayao Miyazaki",
        studio: "Studio Ghibli",
        year: "1997",
        trailer: "trailer2.mp4",
        synopsis: "A young prince named Ashitaka gets cursed by a demon and has to travel far from home to find a cure. On his journey, he gets caught in a huge war. On one side are humans who want to cut down the forest to build their town. On the other side are the giant animal gods of the forest, led by San—a tough girl raised by wolves who wants to protect nature.",
        creatorInfo: "Made by the legendary director Hayao Miyazaki. What makes this movie so special is that there are no clear 'good guys' or 'bad guys.' Everyone is just trying to survive. It has a really strong message about protecting nature and the environment."
      },
      "Howl's Moving Castle": {
        director: "Hayao Miyazaki",
        studio: "Studio Ghibli",
        year: "2004",
        trailer: "trailer3.mp4",
        synopsis: "Sophie is a quiet girl who works in a hat shop. An evil, jealous witch curses Sophie, turning her into an old woman! Too embarrassed to tell anyone, Sophie runs away and finds a job cleaning a giant, walking, magical castle. The castle belongs to a handsome wizard named Howl. Together with a fire demon, they try to break her curse while a big war starts around them.",
        creatorInfo: "This movie is a fan favorite because it blends romance, magic, and beautiful scenery. The director wanted to make a movie about love, but he also added a strong anti-war message because he was against real-world conflicts happening at the time."
      },
      "Ponyo": {
        director: "Hayao Miyazaki",
        studio: "Studio Ghibli",
        year: "2008",
        trailer: "trailer4.mp4",
        synopsis: "Ponyo is a magical goldfish who sneaks away from her underwater home and meets a five-year-old human boy named Sosuke. They become best friends, and Ponyo uses her magic to turn into a human girl. But her strong magic accidentally causes a huge storm. Now, the two kids have to fix the world before the ocean floods everything.",
        creatorInfo: "This is basically a Japanese version of 'The Little Mermaid', but much cuter. The animation of the ocean waves is famous because it was all drawn entirely by hand, without using computers. It’s a very sweet story about childhood friendship."
      },
      "That Time I Got Reincarnated as a Slime": {
        director: "Yasuhito Kikuchi",
        author: "Fuse",
        studio: "8bit",
        year: "2018",
        trailer: "trailer5.mp4",
        synopsis: "A normal guy from Tokyo dies in an accident and wakes up in a fantasy world. But instead of being a cool hero, he's just a weak little slime! Luckily, he has a special power to eat anything and copy its abilities. He takes the name Rimuru Tempest and starts making friends with dragons, goblins, and wolves to build a peaceful town for all monsters.",
        creatorInfo: "This started as a popular online story before becoming a huge anime hit. Unlike most action shows, this one is fun because it focuses more on building a community, making friends, and being a good leader instead of just fighting all the time."
      },
      "My Neighbor Totoro": {
        director: "Hayao Miyazaki",
        studio: "Studio Ghibli",
        year: "1988",
        trailer: "trailer6.mp4",
        synopsis: "Two young sisters, Satsuki and Mei, move to an old house in the countryside to be closer to their sick mother's hospital. While exploring outside, they find out the forest is full of friendly, invisible spirits. They meet a giant, fluffy creature they name Totoro. Totoro takes them on magical adventures and helps them stay happy while they worry about their mom.",
        creatorInfo: "This movie is so famous that Totoro became the official mascot for Studio Ghibli! People love it because it feels like a warm hug—it perfectly captures the feeling of being a kid, exploring the outdoors, and using your imagination."
      },
      "Violet Evergarden": {
        director: "Taichi Ishidate",
        author: "Kana Akatsuki",
        studio: "Kyoto Animation",
        year: "2018",
        trailer: "trailer7.mp4",
        synopsis: "Violet is a young girl who was raised only to be a soldier in a terrible war. Now that the war is over, she has metal arms and doesn't know what to do with her life. Her boss's last words to her were 'I love you,' but she doesn't know what that means. To find out, she gets a job writing letters for other people, learning about human feelings along the way.",
        creatorInfo: "This anime is famous for having some of the most beautiful and detailed artwork ever made. It's a very emotional and touching story about dealing with sadness, learning how to connect with others, and finding a new purpose in life."
      },
      "Your Name": {
        director: "Makoto Shinkai",
        studio: "CoMix Wave Films",
        year: "2016",
        trailer: "trailer8.mp4",
        synopsis: "Mitsuha is a girl in a quiet country town, and Taki is a boy living in busy Tokyo. One day, they start magically swapping bodies when they go to sleep! They have to leave each other notes to figure out what's going on. They slowly fall in love, but when they try to finally meet in real life, they discover a shocking secret about time and a falling comet.",
        creatorInfo: "The director of this movie is famous for drawing the most gorgeous skies and cities. This movie became a massive hit all over the world. It’s a beautiful story about fate, time, and how people are connected to each other even when they are far apart."
      },
      "Colorful Stage": {
        director: "SEGA & Colorful Palette",
        studio: "Craft Egg",
        year: "2020",
        trailer: "trailer9.mp4",
        synopsis: "A group of teenagers in Tokyo are dealing with normal high school problems, stress, and trying to follow their dreams. They find a mysterious song on their phones that transports them to a magical, virtual world called 'Sekai.' There, they meet famous virtual singers like Hatsune Miku, who help them face their real-life problems through the power of music and friendship.",
        creatorInfo: "Unlike the movies on this list, this is actually based on a very popular rhythm game for your phone! It features famous virtual pop stars, but it tells really good, relatable stories about teenagers trying to understand their feelings and find their passion."
      },
      "Kiki's Delivery Service": {
        director: "Hayao Miyazaki",
        studio: "Studio Ghibli",
        year: "1989",
        trailer: "trailer10.mp4",
        synopsis: "Kiki is a 13-year-old witch. In her family, witches have to leave home for a year to learn how to live on their own. She flies to a beautiful new city by the sea with her talking black cat, Jiji. Since her only magic power is flying, she starts a delivery business. But growing up is hard, and Kiki has to learn how to believe in herself when things get tough.",
        creatorInfo: "This is a classic coming-of-age movie. It perfectly shows what it feels like to move away from home for the first time, get your first job, and try to find your place in the world. It’s highly relatable for anyone trying to figure out life."
      }
    };

    // Grab the movie title from the URL 
    const urlParams = new URLSearchParams(window.location.search);
    const movieName = urlParams.get('movie');

    // DOM Elements
    const displayTitle = document.getElementById('display-title');
    const metadataContainer = document.getElementById('metadata-container');
    const displaySynopsis = document.getElementById('display-synopsis');
    const displayCreator = document.getElementById('display-creator');
    const infoCard = document.getElementById('info-card');
    const videoContainerWrapper = document.getElementById('video-container-wrapper');
    const videoContainer = document.getElementById('video-container');

    if (movieName && movieDatabase[movieName]) {
      const data = movieDatabase[movieName];
      
      // Update page title
      document.title = `${movieName} - Info`;
      displayTitle.innerText = movieName;

      // Determine Author vs Director label
      const creatorLabel = data.author ? `<strong>Author:</strong> ${data.author}` : `<strong>Director:</strong> ${data.director}`;

      // Inject Metadata tags
      metadataContainer.innerHTML = `
        <div class="tag">${creatorLabel}</div>
        <div class="tag"><strong>Studio:</strong> ${data.studio}</div>
        <div class="tag"><strong>Released:</strong> ${data.year}</div>
      `;

      // INJECT VIDEO IF TRAILER EXISTS
      if (data.trailer) {
        videoContainerWrapper.style.display = 'block'; // Unhide the video section
        videoContainer.innerHTML = `
          <video controls>
            <source src="${data.trailer}" type="video/mp4">
            Your browser does not support the video tag.
          </video>
        `;
      }

      // Inject Text
      displaySynopsis.innerText = data.synopsis;
      displayCreator.innerText = data.creatorInfo;

    } else {
      // Fallback if no movie is found
      infoCard.innerHTML = `
        <div class="not-found">
          <h2>Hmm, we couldn't find that title.</h2>
          <p style="margin-top: 15px;">Please return to the home page and select a movie from the carousel.</p>
        </div>
      `;
    }
  </script>
</body>
</html>
